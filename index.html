<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How an LLM Writes the Next Word</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23071017'/%3E%3Cpath d='M14 34h36M20 22h24M20 46h18' stroke='%2328d7bd' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#071017;
  --panel:#0c1922;
  --panel-2:#10232f;
  --line:#214253;
  --text:#edf7f5;
  --muted:#8eaaa7;
  --teal:#28d7bd;
  --blue:#55a7ff;
  --amber:#ffb545;
  --rose:#ff6f91;
  --green:#75d46f;
  --violet:#b685ff;
  --shadow:0 24px 70px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  overflow-x:hidden;
  color:var(--text);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 18% 12%,rgba(40,215,189,.12),transparent 28rem),
    radial-gradient(circle at 84% 6%,rgba(255,181,69,.11),transparent 25rem),
    linear-gradient(180deg,#071017 0%,#09141c 52%,#071017 100%);
}
button{font:inherit}
.page{
  width:min(1180px,calc(100% - 32px));
  margin:0 auto;
  padding:20px 0 24px;
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:22px;
  align-items:center;
  margin-bottom:15px;
}
.hero > *,
.workspace > *,
.stage-head > *,
.visual > *,
.input-strip,
.tokens{
  min-width:0;
}
.eyebrow{
  color:var(--teal);
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
}
h1{
  margin:5px 0 6px;
  font-size:clamp(1.9rem,3.4vw,3.3rem);
  line-height:1;
  letter-spacing:0;
  max-width:820px;
  overflow-wrap:break-word;
}
.intro{
  margin:0;
  color:var(--muted);
  font-size:clamp(.94rem,1.25vw,1.03rem);
  line-height:1.45;
  max-width:720px;
  overflow-wrap:break-word;
}
.mini-output{
  min-width:250px;
  padding:18px 18px 16px;
  border:1px solid rgba(117,212,111,.36);
  border-radius:8px;
  background:rgba(117,212,111,.06);
  box-shadow:var(--shadow);
}
.mini-label{
  display:block;
  color:var(--green);
  font-size:.75rem;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:9px;
}
.sentence{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  align-items:center;
  min-height:36px;
}
.word{
  display:inline-flex;
  min-height:30px;
  align-items:center;
  justify-content:center;
  padding:5px 10px 6px;
  border-radius:7px;
  background:rgba(255,255,255,.08);
  color:#f8fffd;
  font-weight:800;
}
.word.next{
  background:var(--green);
  color:#071017;
  box-shadow:0 0 24px rgba(117,212,111,.34);
}
.stepper{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:8px;
  margin:15px 0 14px;
}
.step-btn{
  min-height:66px;
  text-align:left;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(12,25,34,.72);
  color:var(--muted);
  cursor:pointer;
  padding:11px 12px;
  transition:transform .22s ease,border-color .22s ease,background .22s ease,color .22s ease;
}
.step-btn:hover{transform:translateY(-2px);border-color:rgba(40,215,189,.5);color:var(--text)}
.step-btn.active{
  background:linear-gradient(180deg,rgba(40,215,189,.2),rgba(12,25,34,.9));
  border-color:var(--teal);
  color:var(--text);
}
.step-number{
  display:inline-grid;
  width:24px;
  height:24px;
  place-items:center;
  margin-right:8px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  color:var(--text);
  font-size:.78rem;
  font-weight:900;
}
.step-btn.active .step-number{background:var(--teal);color:#061016}
.step-name{
  display:block;
  margin-top:8px;
  font-size:.88rem;
  font-weight:800;
}
.workspace{
  display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  gap:14px;
  align-items:stretch;
}
.stage-shell{
  min-height:520px;
  border:1px solid rgba(91,167,255,.28);
  border-radius:8px;
  background:
    linear-gradient(rgba(85,167,255,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(85,167,255,.055) 1px,transparent 1px),
    linear-gradient(180deg,rgba(16,35,47,.95),rgba(8,18,25,.95));
  background-size:38px 38px,38px 38px,auto;
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}
.stage{
  min-height:520px;
  padding:26px;
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  gap:18px;
  animation:rise .32s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stage-head{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:start;
}
.kicker{
  color:var(--teal);
  font-weight:900;
  font-size:.8rem;
  letter-spacing:.14em;
  text-transform:uppercase;
}
.stage-title{
  margin:5px 0 0;
  font-size:clamp(1.45rem,3vw,2.45rem);
  line-height:1.05;
  letter-spacing:0;
  overflow-wrap:break-word;
}
.plain{
  margin:5px 0 0;
  color:var(--muted);
  line-height:1.55;
  max-width:580px;
  overflow-wrap:break-word;
}
.controls{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.icon-btn,.primary-btn{
  min-height:40px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:8px;
  background:rgba(255,255,255,.07);
  color:var(--text);
  cursor:pointer;
  transition:transform .2s ease,background .2s ease,border-color .2s ease;
}
.icon-btn{
  width:42px;
  display:grid;
  place-items:center;
  font-size:1.05rem;
}
.primary-btn{
  padding:0 14px;
  font-weight:850;
  background:var(--teal);
  color:#04100e;
  border-color:var(--teal);
}
.icon-btn:hover,.primary-btn:hover{transform:translateY(-1px);border-color:var(--teal)}
.icon-btn:disabled,.primary-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.visual{
  min-height:335px;
  display:grid;
  place-items:center;
  position:relative;
}
.side{
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(12,25,34,.76);
  padding:20px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:20px;
}
.side h2,.side h3{
  margin:0;
  letter-spacing:0;
}
.side h2{font-size:1.2rem}
.side h3{
  color:var(--muted);
  font-size:.78rem;
  letter-spacing:.13em;
  text-transform:uppercase;
}
.side p,.side li{color:#c9dbd8;line-height:1.5}
.side p{margin:0}
.side ul{
  margin:0;
  padding-left:19px;
  display:grid;
  gap:9px;
}
.side strong{color:#fff}
.takeaway{
  padding-top:16px;
  border-top:1px solid var(--line);
}
.input-strip{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.bubble{
  border:1px solid rgba(40,215,189,.35);
  border-radius:8px;
  background:rgba(40,215,189,.08);
  color:#eafffb;
  min-height:54px;
  padding:13px 18px;
  font-size:1.35rem;
  font-weight:900;
}
.arrow{
  color:var(--muted);
  font-size:1.55rem;
  font-weight:900;
}
.tokens{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
}
.token{
  width:128px;
  display:grid;
  gap:8px;
  justify-items:center;
  animation:pop .48s cubic-bezier(.2,1.2,.3,1) both;
}
@keyframes pop{from{opacity:0;transform:translateY(18px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
.token-word{
  width:100%;
  min-height:54px;
  display:grid;
  place-items:center;
  border-radius:8px;
  color:#071017;
  font-size:1.18rem;
  font-weight:950;
}
.token-id{
  color:var(--muted);
  font-family:"SFMono-Regular",Consolas,monospace;
  font-size:.82rem;
}
.flow-grid{
  width:100%;
  display:grid;
  gap:24px;
}
.fingerprints{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
  width:100%;
}
.fingerprint{
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  background:rgba(255,255,255,.045);
  padding:14px;
  animation:pop .45s ease both;
}
.fingerprint h4{
  margin:0 0 10px;
  font-size:1rem;
}
.bars{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:4px;
  align-items:end;
  height:86px;
}
.bar{
  border-radius:5px 5px 2px 2px;
  min-height:8px;
  transform-origin:bottom;
  animation:grow .75s cubic-bezier(.2,1,.3,1) both;
}
@keyframes grow{from{transform:scaleY(.05);opacity:.35}to{transform:scaleY(1);opacity:1}}
.position-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}
.pin{
  width:82px;
  min-height:58px;
  display:grid;
  place-items:center;
  gap:3px;
  border:1px solid rgba(255,181,69,.3);
  border-radius:8px;
  background:rgba(255,181,69,.08);
  color:#ffdba2;
  font-weight:900;
}
.pin span{
  color:var(--muted);
  font-size:.72rem;
  font-weight:800;
  text-transform:uppercase;
}
.attention-wrap{
  width:min(760px,100%);
}
.attention-svg{
  width:100%;
  overflow:visible;
}
.transformer-grid{
  width:min(820px,100%);
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(260px,.85fr);
  gap:18px;
  align-items:center;
}
.block-chain{
  display:grid;
  gap:8px;
}
.mini-block{
  border:1px solid rgba(182,133,255,.35);
  border-radius:8px;
  background:rgba(182,133,255,.08);
  padding:12px;
  animation:pop .4s ease both;
}
.mini-block strong{
  display:block;
  font-size:.95rem;
  margin-bottom:4px;
}
.mini-block span{
  color:#cdbdff;
  font-size:.84rem;
  line-height:1.35;
}
.mini-down{
  text-align:center;
  color:var(--muted);
  font-weight:900;
}
.beam{
  stroke-dasharray:900;
  stroke-dashoffset:900;
  animation:draw 1s ease forwards;
}
@keyframes draw{to{stroke-dashoffset:0}}
.layer-stack{
  width:min(710px,100%);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  align-items:center;
}
.layer{
  min-height:118px;
  border:1px solid rgba(182,133,255,.35);
  border-radius:8px;
  background:rgba(182,133,255,.08);
  padding:14px;
  position:relative;
  overflow:hidden;
  animation:pop .45s ease both;
}
.layer:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.12),transparent);
  transform:translateX(-120%);
  animation:sweep 1.6s ease infinite;
}
@keyframes sweep{to{transform:translateX(120%)}}
.layer h4{margin:0 0 10px;font-size:1rem}
.layer p{margin:0;color:#cdbdff;font-size:.9rem;line-height:1.35}
.layer-arrow{
  text-align:center;
  color:var(--muted);
  font-size:1.7rem;
}
.probabilities{
  width:min(680px,100%);
  display:grid;
  gap:12px;
}
.prob-row{
  display:grid;
  grid-template-columns:92px minmax(0,1fr) 52px;
  align-items:center;
  gap:12px;
}
.prob-word{
  text-align:right;
  font-weight:950;
  color:#fff;
}
.track{
  height:38px;
  background:rgba(255,255,255,.07);
  border-radius:8px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
}
.fill{
  height:100%;
  width:0;
  border-radius:7px;
  animation:fillbar 1s cubic-bezier(.2,1,.3,1) forwards;
}
@keyframes fillbar{to{width:var(--w)}}
.percent{
  color:var(--muted);
  font-weight:900;
}
.winner{
  margin-top:6px;
  text-align:center;
  color:#071017;
  background:var(--amber);
  border-radius:8px;
  padding:11px 14px;
  font-weight:950;
  animation:pop .45s ease both;
}
.loop{
  width:min(730px,100%);
  display:grid;
  grid-template-columns:1fr 150px 1fr;
  gap:18px;
  align-items:center;
}
.loop-box{
  border:1px solid rgba(117,212,111,.35);
  border-radius:8px;
  background:rgba(117,212,111,.07);
  padding:18px;
  min-height:155px;
}
.loop-box h4{
  margin:0 0 12px;
  color:var(--green);
  font-size:.85rem;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.loop-arrow{
  min-height:150px;
  display:grid;
  place-items:center;
}
.loop-arrow svg{
  width:145px;
  height:145px;
  animation:spin 4.5s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.next-word{
  display:inline-flex;
  margin-top:14px;
  min-height:52px;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  padding:0 18px;
  background:var(--green);
  color:#071017;
  font-size:1.45rem;
  font-weight:950;
}
.pulse{
  animation:pulse 1.2s ease infinite;
}
@keyframes pulse{50%{transform:scale(1.04);filter:brightness(1.15)}}
.mobile-nav{
  display:none;
  gap:8px;
  margin-top:12px;
}
@media(max-width:920px){
  .hero{grid-template-columns:1fr}
  .mini-output{width:100%;min-width:0}
  .workspace{grid-template-columns:1fr}
  .side{min-height:0}
  .stage-shell,.stage{min-height:520px}
  .transformer-grid{grid-template-columns:1fr}
  .fingerprints{grid-template-columns:1fr}
  .layer-stack{grid-template-columns:1fr}
  .layer-arrow{transform:rotate(90deg)}
  .loop{grid-template-columns:1fr}
  .loop-arrow{min-height:90px}
}
@media(max-width:700px){
  .page{width:min(calc(100% - 20px),1180px);padding-top:18px}
  h1{font-size:clamp(1.75rem,8vw,2.35rem);line-height:1.05}
  .intro{font-size:.94rem}
  .stepper{grid-template-columns:1fr;gap:7px}
  .step-btn{min-height:52px}
  .step-name{display:inline;margin-top:0}
  .stage{padding:18px}
  .stage-head{display:grid}
  .visual{min-height:360px}
  .controls{display:none}
  .mobile-nav{display:flex}
  .token{width:96px}
  .token-word{min-height:46px;font-size:1rem}
  .prob-row{grid-template-columns:70px minmax(0,1fr) 46px}
  .bubble{font-size:1rem}
}
</style>
</head>
<body>
<main class="page">
  <section class="hero" aria-labelledby="page-title">
    <div>
      <div class="eyebrow">Five-click visual explainer</div>
      <h1 id="page-title">How an LLM writes one next word</h1>
      <p class="intro">An LLM does not “think” in full sentences at once. It turns text into tokens, studies the context, scores likely next tokens, picks one, then repeats.</p>
    </div>
    <aside class="mini-output" aria-label="Generated sentence preview">
      <span class="mini-label">Current tiny story</span>
      <div class="sentence" id="sentencePreview"></div>
    </aside>
  </section>

  <nav class="stepper" id="stepper" aria-label="LLM explanation steps"></nav>

  <section class="workspace">
    <div class="stage-shell">
      <div class="stage" id="stage"></div>
    </div>
    <aside class="side" id="side"></aside>
  </section>
  <div class="mobile-nav">
    <button class="icon-btn" id="mobilePrev" type="button" aria-label="Previous step">‹</button>
    <button class="primary-btn" id="mobileNext" type="button">Next step</button>
  </div>
</main>

<script>
const tokens=[
  {word:"The",id:464,color:"#28d7bd"},
  {word:"cat",id:3797,color:"#ffb545"},
  {word:"sat",id:3332,color:"#55a7ff"}
];

const steps=[
  {
    name:"Input",
    title:"Start with normal text",
    plain:"The sentence is still human-readable. The model first chops it into small pieces it can track.",
    sideTitle:"What to notice",
    bullets:[
      "The model sees pieces of text, not ideas yet.",
      "Common words often become one token.",
      "Each token gets an ID so the computer can look it up."
    ],
    takeaway:"Plain text becomes labeled building blocks.",
    render:renderInput,
    preview:["The","cat","sat"]
  },
  {
    name:"Embeddings",
    title:"Turn each token into a meaning fingerprint",
    plain:"Each token ID points to a long list of numbers. You can picture that list as a colored fingerprint for meaning and position.",
    sideTitle:"Why this matters",
    bullets:[
      "Similar words get fingerprints that behave similarly.",
      "Position is added so “cat sat” is different from “sat cat.”",
      "From here on, the model moves these fingerprints around."
    ],
    takeaway:"Words become movable meaning patterns.",
    render:renderEmbeddings,
    preview:["The","cat","sat"]
  },
  {
    name:"Transformer",
    title:"Let the words look at each other",
    plain:"The transformer asks: which earlier tokens matter most for the next one? Stronger connections get more weight.",
    sideTitle:"No math version",
    bullets:[
      "“sat” strongly points back to “cat.”",
      "The model is building context, not just reading left to right.",
      "Many attention heads can notice different relationships at once."
    ],
    takeaway:"Context is made by comparing tokens with tokens.",
    render:renderTransformer,
    preview:["The","cat","sat"]
  },
  {
    name:"Output",
    title:"Score possible next tokens",
    plain:"After the transformer layers, the model gives many possible next tokens a score. The biggest score is the next guess.",
    sideTitle:"The choice",
    bullets:[
      "The model does not search the web here.",
      "It scores vocabulary options from its training.",
      "For this sentence, “on” is the most likely next token."
    ],
    takeaway:"The output is a ranked guess.",
    render:renderOutput,
    preview:["The","cat","sat"]
  },
  {
    name:"Loop",
    title:"Feed the new token back in",
    plain:"The chosen token is added to the sentence. Then the same five-step process runs again to predict the next token.",
    sideTitle:"How text grows",
    bullets:[
      "One token is generated at a time.",
      "Each new token changes the context for the next guess.",
      "A long answer is this loop repeated many times."
    ],
    takeaway:"Generation is a loop, not a single magic jump.",
    render:renderLoop,
    preview:["The","cat","sat","on"]
  }
];

let current=0;
const stepper=document.getElementById("stepper");
const stage=document.getElementById("stage");
const side=document.getElementById("side");
const preview=document.getElementById("sentencePreview");
const mobilePrev=document.getElementById("mobilePrev");
const mobileNext=document.getElementById("mobileNext");

function init(){
  steps.forEach((step,index)=>{
    const button=document.createElement("button");
    button.className="step-btn";
    button.type="button";
    button.setAttribute("aria-label",`Show step ${index+1}: ${step.name}`);
    button.innerHTML=`<span class="step-number">${index+1}</span><span class="step-name">${step.name}</span>`;
    button.addEventListener("click",()=>go(index));
    stepper.appendChild(button);
  });
  mobilePrev.addEventListener("click",()=>go(current-1));
  mobileNext.addEventListener("click",()=>go(current+1));
  document.addEventListener("keydown",(event)=>{
    if(event.key==="ArrowRight") go(current+1);
    if(event.key==="ArrowLeft") go(current-1);
  });
  go(0);
}

function go(index){
  if(index<0||index>=steps.length) return;
  current=index;
  document.querySelectorAll(".step-btn").forEach((button,i)=>{
    button.classList.toggle("active",i===current);
    button.setAttribute("aria-current",i===current?"step":"false");
  });
  const step=steps[current];
  stage.innerHTML=`
    <div class="stage-head">
      <div>
        <div class="kicker">Step ${current+1} of 5 · ${step.name}</div>
        <h2 class="stage-title">${step.title}</h2>
        <p class="plain">${step.plain}</p>
      </div>
      <div class="controls">
        <button class="icon-btn" type="button" aria-label="Previous step" ${current===0?"disabled":""} onclick="go(${current-1})">‹</button>
        <button class="primary-btn" type="button" ${current===steps.length-1?"disabled":""} onclick="go(${current+1})">${current===steps.length-2?"Show loop":"Next step"}</button>
      </div>
    </div>
    <div class="visual" id="visual"></div>
  `;
  step.render(document.getElementById("visual"));
  side.innerHTML=`
    <div>
      <h3>${step.sideTitle}</h3>
      <ul>${step.bullets.map(item=>`<li>${item}</li>`).join("")}</ul>
    </div>
    <div class="takeaway">
      <h2>Takeaway</h2>
      <p><strong>${step.takeaway}</strong></p>
    </div>
  `;
  renderPreview(step.preview,current===4);
  mobilePrev.disabled=current===0;
  mobileNext.disabled=current===steps.length-1;
  mobileNext.textContent=current===steps.length-2?"Show loop":"Next step";
}

function renderPreview(words,highlightLast){
  preview.innerHTML=words.map((word,index)=>{
    const isNext=highlightLast&&index===words.length-1;
    return `<span class="word ${isNext?"next":""}">${word}</span>`;
  }).join("");
}

function renderInput(root){
  root.innerHTML=`
    <div class="flow-grid">
      <div class="input-strip">
        <div class="bubble">The cat sat</div>
        <div class="arrow">→</div>
        <div class="tokens">
          ${tokens.map((token,index)=>`
            <div class="token" style="animation-delay:${index*.12}s">
              <div class="token-word" style="background:${token.color}">${token.word}</div>
              <div class="token-id">token ID ${token.id}</div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function renderEmbeddings(root){
  root.innerHTML=`
    <div class="flow-grid">
      <div class="fingerprints">
        ${tokens.map((token,index)=>`
          <div class="fingerprint" style="animation-delay:${index*.12}s">
            <h4 style="color:${token.color}">${token.word}</h4>
            <div class="bars">
              ${makeBars(token.id,token.color)}
            </div>
          </div>
        `).join("")}
      </div>
      <div class="position-row" aria-label="Token positions">
        ${tokens.map((token,index)=>`
          <div class="pin"><span>place</span>${index+1}</div>
        `).join("")}
      </div>
    </div>
  `;
}

function makeBars(seed,color){
  let value=seed;
  const heights=[];
  for(let i=0;i<12;i++){
    value=(value*9301+49297)%233280;
    heights.push(18+Math.round((value/233280)*68));
  }
  return heights.map((height,index)=>`
    <div class="bar" style="height:${height}px;background:${color};animation-delay:${index*.04}s"></div>
  `).join("");
}

function renderTransformer(root){
  root.innerHTML=`
    <div class="transformer-grid">
      <div class="attention-wrap">
        <svg class="attention-svg" viewBox="0 0 760 360" role="img" aria-label="Attention lines between tokens">
          <defs>
            <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
              <path d="M0,0 L10,5 L0,10 z" fill="#75d46f"></path>
            </marker>
          </defs>
          <text x="380" y="36" text-anchor="middle" fill="#8eaaa7" font-size="16" font-weight="800">The current token asks: what should matter?</text>
          <path class="beam" d="M585 244 C520 92 377 92 310 244" fill="none" stroke="#ffb545" stroke-width="12" stroke-linecap="round" opacity=".8" marker-end="url(#arrowHead)"></path>
          <path class="beam" d="M585 244 C410 35 190 82 170 244" fill="none" stroke="#28d7bd" stroke-width="5" stroke-linecap="round" opacity=".62" marker-end="url(#arrowHead)" style="animation-delay:.18s"></path>
          <path class="beam" d="M310 244 C386 166 505 170 585 244" fill="none" stroke="#55a7ff" stroke-width="4" stroke-linecap="round" opacity=".46" marker-end="url(#arrowHead)" style="animation-delay:.35s"></path>
          ${tokens.map((token,index)=>{
            const x=[170,310,585][index];
            return `
              <rect x="${x-58}" y="244" width="116" height="64" rx="8" fill="${token.color}"></rect>
              <text x="${x}" y="283" text-anchor="middle" fill="#071017" font-size="24" font-weight="950">${token.word}</text>
            `;
          }).join("")}
          <text x="585" y="333" text-anchor="middle" fill="#c9dbd8" font-size="14">focus token</text>
          <text x="310" y="333" text-anchor="middle" fill="#ffddb0" font-size="14">strong clue</text>
        </svg>
      </div>
      <div class="block-chain" aria-label="Transformer decoder block">
        <div class="mini-block" style="animation-delay:.05s">
          <strong>1. Self-attention</strong>
          <span>Mix the tokens using the strongest context lines.</span>
        </div>
        <div class="mini-down">↓</div>
        <div class="mini-block" style="animation-delay:.15s">
          <strong>2. Clean up</strong>
          <span>Keep useful signal and steady the result.</span>
        </div>
        <div class="mini-down">↓</div>
        <div class="mini-block" style="animation-delay:.25s">
          <strong>3. Neural network</strong>
          <span>Transform the mixed meaning into a richer pattern.</span>
        </div>
        <div class="mini-down">↓</div>
        <div class="mini-block" style="animation-delay:.35s">
          <strong>4. Repeat</strong>
          <span>Run many blocks so the context gets sharper.</span>
        </div>
      </div>
    </div>
  `;
}

function renderOutput(root){
  const choices=[
    {word:"on",percent:68,color:"#ffb545"},
    {word:"in",percent:22,color:"#55a7ff"},
    {word:"by",percent:6,color:"#b685ff"},
    {word:"quietly",percent:3,color:"#28d7bd"},
    {word:"under",percent:1,color:"#ff6f91"}
  ];
  root.innerHTML=`
    <div class="probabilities">
      ${choices.map((choice,index)=>`
        <div class="prob-row">
          <div class="prob-word">${choice.word}</div>
          <div class="track">
            <div class="fill" style="--w:${choice.percent}%;background:${choice.color};animation-delay:${index*.1}s"></div>
          </div>
          <div class="percent">${choice.percent}%</div>
        </div>
      `).join("")}
      <div class="winner">“on” is most likely, so the model adds it next.</div>
    </div>
  `;
}

function renderLoop(root){
  root.innerHTML=`
    <div class="loop">
      <div class="loop-box">
        <h4>New input</h4>
        <div class="sentence">
          <span class="word">The</span>
          <span class="word">cat</span>
          <span class="word">sat</span>
          <span class="word next pulse">on</span>
        </div>
      </div>
      <div class="loop-arrow" aria-hidden="true">
        <svg viewBox="0 0 120 120">
          <path d="M91 35A42 42 0 1 0 95 80" fill="none" stroke="#75d46f" stroke-width="10" stroke-linecap="round"></path>
          <path d="M96 82 L99 53 L75 69 Z" fill="#75d46f"></path>
        </svg>
      </div>
      <div class="loop-box">
        <h4>Next prediction</h4>
        <p class="plain">Now the model predicts the next token after “on”.</p>
        <div class="next-word pulse">the</div>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
