<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How ChatGPT Writes an Answer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f6f8ff'/%3E%3Cpath d='M14 34h36M20 22h24M20 46h18' stroke='%232f6fed' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#f6f8ff;
  --paper:#ffffff;
  --panel:#ffffff;
  --panel-2:#edf2ff;
  --line:#d7deec;
  --text:#27211b;
  --muted:#667085;
  --teal:#2f6fed;
  --blue:#4f8df7;
  --amber:#f4a62a;
  --rose:#e85d75;
  --green:#34a853;
  --violet:#8b5cf6;
  --shadow:0 18px 45px rgba(36,54,89,.12);
}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  overflow-x:hidden;
  color:var(--text);
  font-family:Aptos,"Segoe UI",ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:
    linear-gradient(120deg,rgba(255,255,255,.72),transparent 34rem),
    radial-gradient(circle at 12% 8%,rgba(47,111,237,.13),transparent 24rem),
    radial-gradient(circle at 86% 2%,rgba(244,166,42,.13),transparent 25rem),
    linear-gradient(180deg,#f6f8ff 0%,#eef4ff 54%,#f8fbff 100%);
}
button{font:inherit}
.page{
  width:min(1180px,calc(100% - 32px));
  margin:0 auto;
  padding:20px 0 24px;
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:22px;
  align-items:center;
  margin-bottom:15px;
}
.hero > *,
.workspace > *,
.stage-head > *,
.visual > *,
.input-strip,
.tokens{
  min-width:0;
}
.eyebrow{
  color:var(--teal);
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
}
h1{
  margin:5px 0 6px;
  font-size:clamp(1.9rem,3.4vw,3.3rem);
  line-height:1.04;
  letter-spacing:0;
  max-width:820px;
  overflow-wrap:break-word;
  font-weight:900;
}
.intro{
  margin:0;
  color:var(--muted);
  font-size:clamp(.94rem,1.25vw,1.03rem);
  line-height:1.45;
  max-width:720px;
  overflow-wrap:break-word;
}
.language-switch{
  justify-self:end;
  display:flex;
  align-items:center;
  gap:6px;
  padding:5px;
  border:1px solid rgba(87,103,132,.18);
  border-radius:999px;
  background:rgba(255,255,255,.86);
  box-shadow:0 12px 30px rgba(36,54,89,.1);
}
.flag-btn{
  width:42px;
  height:36px;
  border:1px solid transparent;
  border-radius:999px;
  background:transparent;
  display:grid;
  place-items:center;
  font-size:1.35rem;
  cursor:pointer;
  transition:transform .2s ease,border-color .2s ease,background .2s ease;
}
.flag-btn:hover{transform:translateY(-1px);background:#eef4ff}
.flag-btn.active{
  border-color:rgba(47,111,237,.38);
  background:rgba(47,111,237,.12);
  box-shadow:inset 0 0 0 1px rgba(47,111,237,.08);
}
.sentence{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  align-items:center;
  min-height:36px;
}
.word{
  display:inline-flex;
  min-height:30px;
  align-items:center;
  justify-content:center;
  padding:5px 10px 6px;
  border-radius:7px;
  background:#e9eef8;
  color:var(--text);
  font-weight:800;
}
.word.next{
  background:var(--green);
  color:#fff;
  box-shadow:0 10px 24px rgba(52,168,83,.22);
}
.stepper{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:8px;
  margin:15px 0 14px;
}
.step-btn{
  min-height:66px;
  text-align:left;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(255,255,255,.78);
  color:var(--muted);
  cursor:pointer;
  padding:11px 12px;
  transition:transform .22s ease,border-color .22s ease,background .22s ease,color .22s ease;
}
.step-btn:hover{transform:translateY(-2px);border-color:rgba(47,111,237,.42);color:var(--text)}
.step-btn.active{
  background:linear-gradient(180deg,rgba(47,111,237,.14),rgba(255,255,255,.96));
  border-color:var(--teal);
  color:var(--text);
}
.step-number{
  display:inline-grid;
  width:24px;
  height:24px;
  place-items:center;
  margin-right:8px;
  border-radius:50%;
  background:#e9eef8;
  color:var(--text);
  font-size:.78rem;
  font-weight:900;
}
.step-btn.active .step-number{background:var(--teal);color:#fff}
.step-name{
  display:block;
  margin-top:8px;
  font-size:.88rem;
  font-weight:800;
}
.workspace{
  display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  gap:14px;
  align-items:stretch;
}
.stage-shell{
  min-height:520px;
  border:1px solid rgba(87,103,132,.22);
  border-radius:8px;
  background:
    linear-gradient(rgba(47,111,237,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(47,111,237,.055) 1px,transparent 1px),
    linear-gradient(180deg,rgba(255,255,255,.96),rgba(244,247,252,.94));
  background-size:38px 38px,38px 38px,auto;
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}
.stage{
  min-height:520px;
  padding:26px;
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  gap:18px;
  animation:rise .32s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stage-head{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:start;
}
.kicker{
  color:var(--teal);
  font-weight:900;
  font-size:.8rem;
  letter-spacing:.14em;
  text-transform:uppercase;
}
.stage-title{
  margin:5px 0 0;
  font-size:clamp(1.45rem,3vw,2.45rem);
  line-height:1.05;
  letter-spacing:0;
  overflow-wrap:break-word;
}
.plain{
  margin:5px 0 0;
  color:var(--muted);
  line-height:1.55;
  max-width:580px;
  overflow-wrap:break-word;
}
.controls{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.icon-btn,.primary-btn{
  min-height:40px;
  border:1px solid rgba(39,33,27,.12);
  border-radius:8px;
  background:rgba(255,255,255,.75);
  color:var(--text);
  cursor:pointer;
  transition:transform .2s ease,background .2s ease,border-color .2s ease;
}
.icon-btn{
  width:42px;
  display:grid;
  place-items:center;
  font-size:1.05rem;
}
.primary-btn{
  padding:0 14px;
  font-weight:850;
  background:var(--teal);
  color:#fff;
  border-color:var(--teal);
}
.icon-btn:hover,.primary-btn:hover{transform:translateY(-1px);border-color:var(--teal)}
.icon-btn:disabled,.primary-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.visual{
  min-height:335px;
  display:grid;
  place-items:center;
  position:relative;
}
.run-panel{
  width:min(620px,100%);
  display:grid;
  justify-items:center;
  gap:18px;
  text-align:center;
  padding:26px;
  border:1px solid rgba(47,111,237,.2);
  border-radius:8px;
  background:rgba(255,255,255,.84);
}
.run-panel .bubble{
  max-width:100%;
}
.run-panel p{
  margin:0;
  max-width:460px;
  color:var(--muted);
  line-height:1.5;
}
.run-btn{
  min-height:52px;
  padding:0 22px;
  border:0;
  border-radius:8px;
  background:var(--teal);
  color:#fff;
  font-weight:950;
  cursor:pointer;
  box-shadow:0 16px 32px rgba(47,111,237,.2);
  transition:transform .2s ease,filter .2s ease;
}
.run-btn:hover{transform:translateY(-2px);filter:brightness(1.06)}
.run-btn:active{transform:translateY(0)}
.prompt-demo{
  width:min(720px,100%);
  display:grid;
  gap:18px;
  justify-items:center;
}
.prompt-question{
  margin:0;
  color:var(--text);
  font-size:clamp(1.45rem,3vw,2.25rem);
  font-weight:650;
  text-align:center;
}
.chat-composer{
  width:100%;
  min-height:76px;
  display:grid;
  grid-template-columns:44px minmax(0,1fr) 54px;
  align-items:center;
  gap:12px;
  border:1px solid rgba(87,103,132,.24);
  border-radius:999px;
  background:#fff;
  padding:10px 12px 10px 20px;
  box-shadow:0 20px 55px rgba(36,54,89,.14);
}
.composer-plus{
  width:32px;
  height:32px;
  display:grid;
  place-items:center;
  color:#111827;
  font-size:2rem;
  line-height:1;
  font-weight:300;
}
.composer-text{
  color:#111827;
  font-size:1.12rem;
  font-weight:650;
  text-align:left;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.send-circle{
  width:52px;
  height:52px;
  border:0;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#1677f2;
  color:#fff;
  cursor:pointer;
  box-shadow:0 12px 24px rgba(22,119,242,.24);
  transition:transform .2s ease,filter .2s ease;
}
.send-circle:hover{transform:translateY(-2px);filter:brightness(1.05)}
.send-circle span{
  display:block;
  font-size:1.8rem;
  font-weight:900;
  line-height:1;
  transform:translateY(-1px);
}
.side{
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(255,255,255,.8);
  padding:20px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:20px;
}
.side h2,.side h3{
  margin:0;
  letter-spacing:0;
}
.side h2{font-size:1.2rem}
.side h3{
  color:var(--muted);
  font-size:.78rem;
  letter-spacing:.13em;
  text-transform:uppercase;
}
.side p,.side li{color:#344054;line-height:1.5}
.side p{margin:0}
.side ul{
  margin:0;
  padding-left:19px;
  display:grid;
  gap:9px;
}
.side strong{color:var(--text)}
.takeaway{
  padding-top:16px;
  border-top:1px solid var(--line);
}
.input-strip{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.bubble{
  border:1px solid rgba(47,111,237,.28);
  border-radius:8px;
  background:rgba(47,111,237,.08);
  color:#1d3f8e;
  min-height:54px;
  padding:13px 18px;
  font-size:1.35rem;
  font-weight:900;
}
.arrow{
  color:var(--muted);
  font-size:1.55rem;
  font-weight:900;
}
.tokens{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
}
.token{
  width:128px;
  display:grid;
  gap:8px;
  justify-items:center;
  animation:pop .48s cubic-bezier(.2,1.2,.3,1) both;
}
@keyframes pop{from{opacity:0;transform:translateY(18px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
.token-word{
  width:100%;
  min-height:54px;
  display:grid;
  place-items:center;
  border-radius:8px;
  color:#1f1a15;
  font-size:1.18rem;
  font-weight:950;
}
.token-id{
  color:var(--muted);
  font-family:"SFMono-Regular",Consolas,monospace;
  font-size:.82rem;
}
.flow-grid{
  width:100%;
  display:grid;
  gap:24px;
}
.fingerprints{
  display:grid;
  grid-template-columns:repeat(5,minmax(110px,1fr));
  gap:14px;
  width:100%;
}
.fingerprint{
  border:1px solid rgba(87,103,132,.18);
  border-radius:8px;
  background:rgba(255,255,255,.78);
  padding:38px 12px 12px;
  animation:pop .45s ease both;
  position:relative;
  text-align:left;
  cursor:pointer;
  color:var(--text);
  font:inherit;
  transition:transform .2s ease,border-color .2s ease,background .2s ease;
}
.fingerprint:hover,.fingerprint.active{
  transform:translateY(-3px);
  border-color:var(--teal);
  background:rgba(47,111,237,.08);
}
.fingerprint h4{
  margin:0 0 10px;
  font-size:1rem;
}
.position-stamp{
  position:absolute;
  top:8px;
  right:8px;
  padding:4px 7px;
  border:1px solid rgba(244,166,42,.45);
  border-radius:999px;
  background:rgba(244,166,42,.16);
  color:#7a4a00;
  font-size:.67rem;
  font-weight:900;
  text-transform:uppercase;
}
.vector-meta{
  display:flex;
  justify-content:space-between;
  gap:8px;
  margin:10px 0 7px;
  color:var(--muted);
  font-size:.68rem;
  font-weight:850;
  text-transform:uppercase;
}
.vector-line{
  color:#3f372f;
  font-family:"SFMono-Regular",Consolas,monospace;
  font-size:.72rem;
  line-height:1.35;
  overflow-wrap:anywhere;
}
.embedding-info{
  min-height:100px;
  border:1px solid rgba(47,111,237,.2);
  border-radius:8px;
  background:rgba(47,111,237,.06);
  padding:16px;
  display:grid;
  gap:6px;
  animation:pop .35s ease both;
}
.embedding-info h4{
  margin:0;
  color:var(--teal);
  font-size:.88rem;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.embedding-info p{
  margin:0;
  color:#344054;
  line-height:1.45;
}
.embedding-info strong{color:var(--text)}
.position-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}
.pin{
  width:82px;
  min-height:58px;
  display:grid;
  place-items:center;
  gap:3px;
  border:1px solid rgba(255,181,69,.3);
  border-radius:8px;
  background:rgba(255,181,69,.08);
  color:#ffdba2;
  font-weight:900;
}
.pin span{
  color:var(--muted);
  font-size:.72rem;
  font-weight:800;
  text-transform:uppercase;
}
.attention-wrap{
  width:min(760px,100%);
}
.attention-svg{
  width:100%;
  overflow:visible;
}
.transformer-grid{
  width:min(820px,100%);
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(260px,.85fr);
  gap:18px;
  align-items:center;
}
.block-chain{
  display:grid;
  gap:8px;
}
.mini-block{
  border:1px solid rgba(139,92,246,.22);
  border-radius:8px;
  background:rgba(255,255,255,.82);
  padding:12px;
  animation:pop .4s ease both;
}
.mini-block strong{
  display:block;
  font-size:.95rem;
  margin-bottom:4px;
}
.mini-block span{
  color:#5b4d85;
  font-size:.84rem;
  line-height:1.35;
}
.mini-down{
  text-align:center;
  color:var(--muted);
  font-weight:900;
}
.beam{
  stroke-dasharray:900;
  stroke-dashoffset:900;
  animation:draw 1s ease forwards;
}
@keyframes draw{to{stroke-dashoffset:0}}
.attention-token{
  cursor:pointer;
}
.attention-token rect{
  transition:stroke .2s ease,stroke-width .2s ease,filter .2s ease;
}
.attention-token.active rect{
  stroke:#1f2937;
  stroke-width:4;
  filter:drop-shadow(0 8px 12px rgba(47,111,237,.18));
}
.attention-label{
  min-height:36px;
  margin-top:8px;
  color:#4b4038;
  font-size:.9rem;
  line-height:1.4;
  text-align:center;
}
.attention-label strong{color:var(--text)}
.layer-stack{
  width:min(710px,100%);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  align-items:center;
}
.layer{
  min-height:118px;
  border:1px solid rgba(182,133,255,.35);
  border-radius:8px;
  background:rgba(182,133,255,.08);
  padding:14px;
  position:relative;
  overflow:hidden;
  animation:pop .45s ease both;
}
.layer:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.12),transparent);
  transform:translateX(-120%);
  animation:sweep 1.6s ease infinite;
}
@keyframes sweep{to{transform:translateX(120%)}}
.layer h4{margin:0 0 10px;font-size:1rem}
.layer p{margin:0;color:#cdbdff;font-size:.9rem;line-height:1.35}
.layer-arrow{
  text-align:center;
  color:var(--muted);
  font-size:1.7rem;
}
.probabilities{
  width:min(680px,100%);
  display:grid;
  gap:12px;
}
.prob-row{
  display:grid;
  grid-template-columns:92px minmax(0,1fr) 52px;
  align-items:center;
  gap:12px;
}
.prob-word{
  text-align:right;
  font-weight:950;
  color:var(--text);
}
.track{
  height:38px;
  background:#e9eef8;
  border-radius:8px;
  overflow:hidden;
  border:1px solid rgba(87,103,132,.16);
}
.fill{
  height:100%;
  width:0;
  border-radius:7px;
  animation:fillbar 1s cubic-bezier(.2,1,.3,1) forwards;
}
@keyframes fillbar{to{width:var(--w)}}
.percent{
  color:var(--muted);
  font-weight:900;
}
.winner{
  margin-top:6px;
  text-align:center;
  color:#2a1c02;
  background:var(--amber);
  border-radius:8px;
  padding:11px 14px;
  font-weight:950;
  animation:pop .45s ease both;
}
.chat-demo{
  width:min(820px,100%);
  display:grid;
  gap:14px;
}
.chat-window{
  border:1px solid rgba(87,103,132,.18);
  border-radius:8px;
  background:rgba(255,255,255,.78);
  padding:16px;
  display:grid;
  gap:12px;
}
.chat-row{
  display:flex;
}
.chat-row.user{justify-content:flex-end}
.chat-row.ai{justify-content:flex-start}
.chat-bubble{
  max-width:min(520px,100%);
  border-radius:8px;
  padding:11px 13px;
  line-height:1.4;
  font-weight:800;
}
.chat-row.user .chat-bubble{
  background:var(--teal);
  color:#fff;
}
.chat-row.ai .chat-bubble{
  background:#e9eef8;
  color:var(--text);
}
.pipeline-list{
  display:grid;
  gap:10px;
}
.pipeline-pass{
  border:1px solid rgba(52,168,83,.22);
  border-radius:8px;
  background:rgba(52,168,83,.06);
  padding:12px;
  display:grid;
  gap:9px;
  animation:pop .35s ease both;
}
.pipeline-context{
  color:#344054;
  font-size:.86rem;
  line-height:1.4;
}
.pipeline-context strong{color:var(--text)}
.mini-pipeline{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  align-items:center;
}
.pipe-step{
  padding:5px 8px;
  border-radius:999px;
  border:1px solid rgba(47,111,237,.22);
  background:rgba(47,111,237,.08);
  color:#244fbb;
  font-size:.72rem;
  font-weight:900;
}
.pipe-arrow{color:var(--muted);font-weight:900}
.generated-token{
  display:inline-flex;
  align-items:center;
  min-height:30px;
  padding:4px 10px;
  border-radius:7px;
  background:var(--green);
  color:#fff;
  font-weight:950;
}
.chat-note{
  margin:0;
  color:var(--muted);
  line-height:1.45;
  max-width:560px;
}
.loop-box h4{
  margin:0 0 12px;
  color:var(--green);
  font-size:.85rem;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.pulse{
  animation:pulse 1.2s ease infinite;
}
@keyframes pulse{50%{transform:scale(1.04);filter:brightness(1.15)}}
.mobile-nav{
  display:none;
  gap:8px;
  margin-top:12px;
}
@media(max-width:920px){
  .hero{grid-template-columns:1fr}
  .language-switch{justify-self:start}
  .workspace{grid-template-columns:1fr}
  .side{min-height:0}
  .stage-shell,.stage{min-height:520px}
  .fingerprints{grid-template-columns:repeat(2,minmax(0,1fr))}
  .transformer-grid{grid-template-columns:1fr}
  .fingerprints{grid-template-columns:1fr}
  .layer-stack{grid-template-columns:1fr}
  .layer-arrow{transform:rotate(90deg)}
}
@media(max-width:700px){

let lang="en";
let ui=appCopy[lang];
let tokens=ui.tokens;
let attentionRelations=ui.attentionRelations;
let steps=ui.steps;
let current=0;
let currentRan=false;
let activeTimers=[];
const stepper=document.getElementById("stepper");
const stage=document.getElementById("stage");
const side=document.getElementById("side");
const mobilePrev=document.getElementById("mobilePrev");
const mobileNext=document.getElementById("mobileNext");
const pageTitle=document.getElementById("page-title");
const intro=document.querySelector(".intro");
const languageSwitch=document.querySelector(".language-switch");
const languageButtons=document.querySelectorAll(".flag-btn");

function init(){
  languageButtons.forEach(button=>{
    button.addEventListener("click",()=>setLanguage(button.dataset.lang));
  });
  mobilePrev.addEventListener("click",()=>go(current-1));
  mobileNext.addEventListener("click",()=>go(current+1));
  document.addEventListener("keydown",(event)=>{
    if(event.key==="ArrowRight"&&currentRan) go(current+1);
    if(event.key==="ArrowLeft") go(current-1);
  });
  applyLanguage();
  go(0);
}

function setLanguage(nextLang){
  if(!appCopy[nextLang]||nextLang===lang) return;
  clearActiveTimers();
  lang=nextLang;
  ui=appCopy[lang];
  tokens=ui.tokens;
  attentionRelations=ui.attentionRelations;
  steps=ui.steps;
  applyLanguage();
  go(current);
}

function applyLanguage(){
  document.documentElement.lang=ui.htmlLang;
  document.title=ui.documentTitle;
  pageTitle.textContent=ui.heroTitle;
  intro.textContent=ui.heroIntro;
  languageSwitch.setAttribute("aria-label",ui.languageLabel);
  stepper.setAttribute("aria-label",ui.stepperLabel);
  mobilePrev.setAttribute("aria-label",ui.previousStep);
  languageButtons.forEach(button=>{
    const isActive=button.dataset.lang===lang;
    button.classList.toggle("active",isActive);
    button.setAttribute("aria-pressed",isActive?"true":"false");
  });
  buildStepper();
}

function buildStepper(){
  stepper.innerHTML="";
  steps.forEach((step,index)=>{
    const button=document.createElement("button");
    button.className="step-btn";
    button.type="button";
    button.setAttribute("aria-label",ui.showStepAria(index+1,step.name));
    button.innerHTML=`<span class="step-number">${index+1}</span><span class="step-name">${step.name}</span>`;
    button.addEventListener("click",()=>go(index));
    stepper.appendChild(button);
  });
}

function go(index){
  if(index<0||index>=steps.length) return;
  clearActiveTimers();
  current=index;
  currentRan=false;
  document.querySelectorAll(".step-btn").forEach((button,i)=>{
    button.classList.toggle("active",i===current);
    button.setAttribute("aria-current",i===current?"step":"false");
  });
  const step=steps[current];
  stage.innerHTML=`
    <div class="stage-head">
      <div>
        <div class="kicker">${ui.stepKicker(current+1,steps.length,step.name)}</div>
        <h2 class="stage-title">${step.title}</h2>
        <p class="plain">${step.plain}</p>
      </div>
      <div class="controls">
        <button class="icon-btn" type="button" aria-label="${ui.previousStep}" ${current===0?"disabled":""} onclick="go(${current-1})">‹</button>
        <button class="primary-btn" id="nextBtn" type="button" ${current===steps.length-1?"disabled":""} onclick="go(${current+1})">${current===steps.length-2?ui.showLoop:ui.nextStep}</button>
      </div>
    </div>
    <div class="visual" id="visual"></div>
  `;
  renderReady(document.getElementById("visual"),step);
  side.innerHTML=`
    <div>
      <h3>${step.sideTitle}</h3>
      <ul>${step.bullets.map(item=>`<li>${item}</li>`).join("")}</ul>
    </div>
    <div class="takeaway">
      <h2>${ui.takeawayTitle}</h2>
      <p><strong>${step.takeaway}</strong></p>
    </div>
  `;
  mobilePrev.disabled=current===0;
  mobileNext.disabled=true;
  mobileNext.textContent=current===steps.length-2?ui.showLoop:ui.nextStep;
  syncNextState();
}

function runCurrent(){
  clearActiveTimers();
  const step=steps[current];
  currentRan=true;
  renderers[step.key](document.getElementById("visual"));
  syncNextState();
}

function clearActiveTimers(){
  activeTimers.forEach(timer=>clearTimeout(timer));
  activeTimers=[];
}

function later(fn,delay){
  const timer=setTimeout(fn,delay);
  activeTimers.push(timer);
  return timer;
}

function syncNextState(){
  const nextButton=document.getElementById("nextBtn");
  const disabled=!currentRan||current===steps.length-1;
  if(nextButton) nextButton.disabled=disabled;
  mobileNext.disabled=disabled;
}

function renderReady(root,step){
  if(step.key==="split"){
    root.innerHTML=`
      <div class="prompt-demo">
        <p class="prompt-question">${ui.composerQuestion}</p>
        <div class="chat-composer" aria-label="${ui.composerAria}">
          <div class="composer-plus" aria-hidden="true">+</div>
          <div class="composer-text">${ui.splitPrompt}</div>
          <button class="send-circle" type="button" onclick="runCurrent()" aria-label="${ui.sendPromptAria}">
            <span>↑</span>
          </button>
        </div>
      </div>
    `;
    return;
  }
  if(step.key==="loop"){
    root.innerHTML=`
      <div class="prompt-demo">
        <p class="prompt-question">${ui.composerQuestion}</p>
        <div class="chat-composer" aria-label="${ui.composerAria}">
          <div class="composer-plus" aria-hidden="true">+</div>
          <div class="composer-text">${ui.loopPrompt}</div>
          <button class="send-circle" type="button" onclick="runCurrent()" aria-label="${ui.sendPromptAria}">
            <span>↑</span>
          </button>
        </div>
        <p class="chat-note">${ui.loopNote}</p>
      </div>
    `;
    return;
  }
  root.innerHTML=`
    <div class="run-panel">
      <div class="bubble">${ui.splitBubble}</div>
      <p>${step.ready}</p>
      <button class="run-btn" type="button" onclick="runCurrent()">${step.runLabel}</button>
    </div>
  `;
}

function renderInput(root){
  root.innerHTML=`
    <div class="flow-grid">
      <div class="input-strip">
        <div class="bubble">${ui.splitBubble}</div>
        <div class="arrow">→</div>
        <div class="tokens">
          ${tokens.map((token,index)=>`
            <div class="token" style="animation-delay:${index*.12}s">
              <div class="token-word" style="background:${token.color}">${token.word}</div>
              <div class="token-id">${ui.tokenId(token.id)}</div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function renderEmbeddings(root){
  root.innerHTML=`
    <div class="flow-grid">
      <div class="fingerprints">
        ${tokens.map((token,index)=>`
          <button class="fingerprint ${index===0?"active":""}" type="button" onclick="selectEmbedding(${index})" style="animation-delay:${index*.12}s">
            <span class="position-stamp">${ui.place(index+1)}</span>
            <h4 style="color:${token.color}">${token.word}</h4>
            <div class="vector-line">[${makeVectorSample(token.id).join(", ")}, ...]</div>
          </button>
        `).join("")}
      </div>
      <div class="embedding-info" id="embeddingInfo"></div>
    </div>
  `;
  selectEmbedding(0);
}

function selectEmbedding(index){
  const token=tokens[index];
  document.querySelectorAll(".fingerprint").forEach((card,i)=>card.classList.toggle("active",i===index));
  const info=document.getElementById("embeddingInfo");
  if(!info) return;
  info.innerHTML=`
    <h4>${ui.fingerprintHeading(token.word)}</h4>
    <p>${ui.fingerprintParagraph(token)}</p>
    <p>${ui.fingerprintNumbers}</p>
  `;
}

function makeVectorSample(seed){
  let value=seed+17;
  const sample=[];
  for(let i=0;i<8;i++){
    value=(value*9301+49297)%233280;
    sample.push(((value/233280)*2-1).toFixed(2));
  }
  return sample;
}

function renderTransformer(root){
  root.innerHTML=`
    <div class="transformer-grid">
      <div class="attention-wrap">
        <div id="attentionCanvas"></div>
        <div class="attention-label" id="attentionLabel"></div>
      </div>
      <div class="block-chain" aria-label="${ui.wordRelationshipAria}">
        ${ui.relationBlocks.map((block,index)=>`
          <div class="mini-block" style="animation-delay:${.05+index*.1}s">
            <strong>${block[0]}</strong>
            <span>${block[1]}</span>
          </div>
          ${index<ui.relationBlocks.length-1?'<div class="mini-down">↓</div>':""}
        `).join("")}
      </div>
    </div>
  `;
  selectAttention(4);
}

function selectAttention(focusIndex){
  const canvas=document.getElementById("attentionCanvas");
  const label=document.getElementById("attentionLabel");
  if(!canvas) return;
  const xs=[100,225,370,510,650];
  const y=244;
  const relation=attentionRelations[focusIndex];
  const focusX=xs[focusIndex];
  const lines=relation.lines.map((line,index)=>{
    const targetX=xs[line.to];
    const mid=(focusX+targetX)/2;
    const distance=Math.abs(focusX-targetX);
    const curve=64+distance*.34+index*10;
    const stroke=tokens[line.to].color;
    return `<path class="beam" d="M${focusX} ${y} C${focusX} ${y-curve} ${targetX} ${y-curve} ${targetX} ${y}" fill="none" stroke="${stroke}" stroke-width="${line.w}" stroke-linecap="round" opacity="${Math.min(.9,.34+line.w/14)}" style="animation-delay:${index*.12}s"></path>`;
  }).join("");
  const tokenNodes=tokens.map((token,index)=>{
    const x=xs[index];
    const w=token.word==="capital"?132:token.word==="France"||token.word==="Francia"?118:88;
    return `
      <g class="attention-token ${index===focusIndex?"active":""}" role="button" tabindex="0" aria-label="${ui.focusAria(token.word)}" onclick="selectAttention(${index})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();selectAttention(${index})}">
        <rect x="${x-w/2}" y="${y}" width="${w}" height="64" rx="8" fill="${token.color}"></rect>
        <text x="${x}" y="${y+39}" text-anchor="middle" fill="#071017" font-size="24" font-weight="950">${token.word}</text>
      </g>
    `;
  }).join("");
  canvas.innerHTML=`
    <svg class="attention-svg" viewBox="0 0 760 360" role="img" aria-label="${ui.attentionSvgAria(tokens[focusIndex].word)}">
      <text x="380" y="36" text-anchor="middle" fill="#8eaaa7" font-size="16" font-weight="800">${ui.attentionHelp}</text>
      <text x="380" y="62" text-anchor="middle" fill="#c7dad7" font-size="13">${ui.attentionSubhelp}</text>
      ${lines}
      ${tokenNodes}
      <text x="${focusX}" y="333" text-anchor="middle" fill="#c9dbd8" font-size="14">${ui.focusWordLabel}</text>
    </svg>
  `;
  if(label){
    label.innerHTML=ui.attentionLabel(tokens[focusIndex].word,relation.label);
  }
}

function renderOutput(root){
  const choices=ui.outputChoices;
  root.innerHTML=`
    <div class="probabilities">
      ${choices.map((choice,index)=>`
        <div class="prob-row">
          <div class="prob-word">${choice.word}</div>
          <div class="track">
            <div class="fill" style="--w:${choice.percent}%;background:${choice.color};animation-delay:${index*.1}s"></div>
          </div>
          <div class="percent">${choice.percent}%</div>
        </div>
      `).join("")}
      <div class="winner">${ui.outputWinner}</div>
    </div>
  `;
}

function renderLoop(root){
  root.innerHTML=`
    <div class="chat-demo">
      <div class="chat-window" aria-label="${ui.chatLoopAria}">
        <div class="chat-row user">
          <div class="chat-bubble">${ui.loopPrompt}</div>
        </div>
        <div class="chat-row ai">
          <div class="chat-bubble" id="assistantReply">${ui.chatWaiting}</div>
        </div>
      </div>
      <div class="pipeline-list" id="pipelineList"></div>
    </div>
  `;
  animateChatLoop();
}

function animateChatLoop(){
  const prompt=ui.loopPrompt;
  const generated=ui.loopGenerated;
  const reply=document.getElementById("assistantReply");
  const list=document.getElementById("pipelineList");
  let words=[];
  generated.forEach((word,index)=>{
    later(()=>{
      const context=[prompt,...words].join(" / ");
      const pass=document.createElement("div");
      pass.className="pipeline-pass";
      pass.innerHTML=`
        <div class="pipeline-context">${ui.passContext(index+1,context)}</div>
        <div class="mini-pipeline">
          ${ui.pipeSteps.map(step=>`<span class="pipe-step">${step}</span><span class="pipe-arrow">→</span>`).join("")}
          <span class="generated-token">${word}</span>
        </div>
      `;
      list.appendChild(pass);
      words.push(word);
      reply.textContent=words.join(" ");
    },index*1200);
  });
}

init();
</script>
</body>
</html>
